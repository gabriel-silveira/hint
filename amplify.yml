version: 1
appRoot: frontend
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: out
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: Cache-Control
          value: public, max-age=31536000, immutable
    - pattern: '*.html'
      headers:
        - key: Cache-Control
          value: public, max-age=0, must-revalidate
